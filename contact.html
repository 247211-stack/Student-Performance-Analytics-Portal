<html lang="en">

<head>

<meta charset="UTF-8">

<title>Contact Us</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div class="dashboard-container">

<!-- Sidebar -->

<div class="sidebar">

<div class="sidebar-logo">

<i class="fa-solid fa-graduation-cap"></i>

<h2>Student Portal</h2>

</div>

<ul>

<li><a href="index.html" style="color:white;text-decoration:none;"><i class="fa-solid fa-house"></i> Home</a></li>

<li><a href="dashboard.html" style="color:white;text-decoration:none;"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>

<li class="active"><i class="fa-solid fa-envelope"></i> Contact</li>

</ul>

</div>

<!-- Main -->

<div class="main-content">

<header class="topbar">

<h1>Contact Us</h1>

</header>

<div class="performance-section">

<!-- Contact Form -->

<div class="progress-card">

<h2>Send us a Message</h2>

<br>

<form id="contactForm">

<label>Full Name</label>

<input type="text" id="name" placeholder="Enter your name" required>

<br><br>

<label>Email</label>

<input type="email" id="email" placeholder="Enter your email" required>

<br><br>

<label>Phone</label>

<input type="text" id="phone" placeholder="Enter phone number">

<br><br>

<label>Message</label>

<textarea id="message" rows="6" placeholder="Write your message..." required></textarea>

<br><br>

<button type="submit" class="btn">

<i class="fa-solid fa-paper-plane"></i>

Send Message

</button>

</form>

</div>

<!-- Contact Details -->

<div class="activity-card">

<h2>Contact Information</h2>

<br>

<p><i class="fa-solid fa-location-dot"></i>
 Air University, Kharian Campus</p>

<br>

<p><i class="fa-solid fa-phone"></i>
 +92 300 1234567</p>

<br>

<p><i class="fa-solid fa-envelope"></i>
 studentportal@gmail.com</p>

<br>

<p><i class="fa-solid fa-clock"></i>
 Monday - Friday</p>

<br>

<p>09:00 AM - 05:00 PM</p>

</div>

</div>

</div>

</div>

<script src="js/script.js"></script>
